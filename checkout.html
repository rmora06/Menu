<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Confirmar Pedido</title>
    <link rel="stylesheet" href="styles/base.css">
    <link rel="stylesheet" href="styles/components.css">
</head>
<body class="checkout-page">

<div class="checkout-container">

    <h2 class="checkout-title">Resumen del Pedido</h2>

    <div id="order-list"></div>

    <div class="total-box">
        Total: RD$ <span id="total-price">0</span>
    </div>

    <input 
        type="text"
        id="customer-name"
        class="checkout-input"
        placeholder="Tu nombre"
    >

    <button id="confirm-order" class="checkout-btn">
        Confirmar y Enviar por WhatsApp
    </button>

</div>

<script>

    import { db } from "./firebase.js";

    import {
        collection,
        addDoc,
        serverTimestamp
    } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    function showToast(message, type = "error") {

    const toast = document.createElement("div");
    toast.className = `toast ${type}`;
    toast.textContent = message;

    document.body.appendChild(toast);

    setTimeout(() => {
        toast.classList.add("show");
    }, 10);

    setTimeout(() => {
        toast.classList.remove("show");
        setTimeout(() => toast.remove(), 300);
    }, 3000);
}
const cart = JSON.parse(localStorage.getItem("cart")) || [];

// if (cart.length === 0) {
//     window.location.href = "menu.html";
// }
const orderList = document.getElementById("order-list");
const totalSpan = document.getElementById("total-price");

let total = 0;

if (cart.length === 0) {
    orderList.innerHTML = "<p>Tu carrito está vacío.</p>";
} else {
    cart.forEach(item => {

        const subtotal = item.price * item.quantity;
        total += subtotal;

        const div = document.createElement("div");
        div.style.marginBottom = "1rem";

        div.innerHTML = `
            <strong>${item.name}</strong><br>
            Cantidad: ${item.quantity}<br>
            Precio unitario: RD$ ${item.price}<br>
            Subtotal: RD$ ${subtotal}<br>
            ${item.note ? "Nota: " + item.note : ""}
            <hr>
        `;

        orderList.appendChild(div);
    });

    totalSpan.textContent = total;
}

console.log("Script cargado");

document.getElementById("confirm-order").addEventListener("click", () => {

    console.log("Botón presionado");
    console.log("CART EN CHECKOUT:", cart);

    const name = document.getElementById("customer-name").value.trim();

    if (!name) {
        showToast("Por favor ingresa tu nombre.");
        return;
    }
    console.log(cart);

    let message = `Hola, soy ${name}.\n\nQuiero hacer el siguiente pedido:\n\n`;

    cart.forEach(item => {
        message += `• ${item.name}\n`;
        message += `  Cantidad: ${item.quantity}\n`;
        message += `  Precio: RD$ ${item.price}\n`;
        message += `  Subtotal: RD$ ${item.price * item.quantity}\n`;
        if (item.note && item.note.trim() !== "") {
            message += `  Nota: ${item.note}\n`;
        }
        message += `\n`;
    });

    message += `TOTAL: RD$ ${total}`;

    const encodedMessage = encodeURIComponent(message);

    const phone = "18295180484";

    document.getElementById("confirm-order").addEventListener("click", async () => {

  const name = document.getElementById("customer-name").value.trim();
  console.log("Intentando guardar pedido en Firebase");

  await addDoc(collection(db, "orders"), {
    customer: name,
    items: cart,
    total: total,
    status: "pending",
    createdAt: serverTimestamp()
  });
  console.log("Pedido enviado a Firebase");
  window.open(`https://wa.me/${phone}?text=${encodedMessage}`, "_blank");

    });

    // window.open(`https://wa.me/${phone}?text=${encodedMessage}`, "_blank");

    localStorage.removeItem("cart");

    window.location.href = "index.html";
});
</script>

</body>
</html>
