<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Confirmar Pedido</title>
    <link rel="stylesheet" href="styles/base.css">
    <link rel="stylesheet" href="styles/components.css">
</head>
<body class="checkout-page">

<div class="checkout-container">

    <h2 class="checkout-title">Resumen del Pedido</h2>

    <div id="order-list"></div>

    <div class="total-box">
        Total: RD$ <span id="total-price">0</span>
    </div>

    <input 
        type="text"
        id="customer-name"
        class="checkout-input"
        placeholder="Tu nombre"
    >

    <!-- NUEVO: Selección de tipo de pedido -->
    <div class="order-type-container">
        <div class="order-type-btn active" id="btn-pickup" data-type="recoger">Para Recoger</div>
        <div class="order-type-btn" id="btn-delivery" data-type="delivery">Delivery</div>
    </div>

    <!-- NUEVO: Información de Delivery (Oculta por defecto) -->
    <div class="delivery-info" id="delivery-info">
        <button id="get-location" class="location-btn">
            📍 Compartir mi ubicación actual
        </button>
        <p id="location-status" style="font-size: 0.85rem; color: #555; margin-bottom: 1rem; text-align: center;"></p>
        
        <textarea id="delivery-address" class="checkout-input" placeholder="Escribe tu sector, calle y número de casa/apto..."></textarea>
        <input type="hidden" id="maps-link" value="">
    </div>

    <button id="confirm-order" class="checkout-btn">
        Confirmar y Enviar por WhatsApp
    </button>

</div>

<script>
function showToast(message, type = "error") {
    const toast = document.createElement("div");
    toast.className = `toast ${type}`;
    toast.textContent = message;

    document.body.appendChild(toast);

    setTimeout(() => {
        toast.classList.add("show");
    }, 10);

    setTimeout(() => {
        toast.classList.remove("show");
        setTimeout(() => toast.remove(), 300);
    }, 3000);
}

const cart = JSON.parse(localStorage.getItem("cart")) || [];
const orderList = document.getElementById("order-list");
const totalSpan = document.getElementById("total-price");

let total = 0;

if (cart.length === 0) {
    orderList.innerHTML = "<p>Tu carrito está vacío.</p>";
} else {
    cart.forEach(item => {
        const subtotal = item.price * item.quantity;
        total += subtotal;

        const div = document.createElement("div");
        div.classList.add("order-item");

        div.innerHTML = `
            <strong>${item.name}</strong><br>
            Cantidad: ${item.quantity}<br>
            Precio unitario: RD$ ${item.price}<br>
            Subtotal: RD$ ${subtotal}<br>
            <hr>
        `;

        orderList.appendChild(div);
    });

    totalSpan.textContent = total;
}

// ==========================================
// LÓGICA DE DELIVERY VS RECOGER
// ==========================================
let tipoPedido = "Para Recoger";
const btnPickup = document.getElementById("btn-pickup");
const btnDelivery = document.getElementById("btn-delivery");
const deliveryInfo = document.getElementById("delivery-info");

btnPickup.addEventListener("click", () => {
    btnPickup.classList.add("active");
    btnDelivery.classList.remove("active");
    deliveryInfo.classList.remove("active");
    tipoPedido = "Para Recoger";
});

btnDelivery.addEventListener("click", () => {
    btnDelivery.classList.add("active");
    btnPickup.classList.remove("active");
    deliveryInfo.classList.add("active");
    tipoPedido = "Delivery";
});

// ==========================================
// LÓGICA DE GPS (GEOLOCALIZACIÓN)
// ==========================================
const btnLocation = document.getElementById("get-location");
const locationStatus = document.getElementById("location-status");
const mapsLinkInput = document.getElementById("maps-link");

btnLocation.addEventListener("click", () => {
    if (!navigator.geolocation) {
        locationStatus.textContent = "Tu navegador no soporta GPS.";
        return;
    }
    
    locationStatus.textContent = "Obteniendo ubicación...";
    
    navigator.geolocation.getCurrentPosition(
        (position) => {
            const lat = position.coords.latitude;
            const lng = position.coords.longitude;
            // Creamos un enlace de Google Maps con las coordenadas
            const link = `https://maps.google.com/?q=${lat},${lng}`;
            mapsLinkInput.value = link;
            locationStatus.innerHTML = `<span style="color: #27ae60;">✅ Ubicación obtenida. Puedes añadir detalles abajo.</span>`;
        },
        (error) => {
            locationStatus.innerHTML = `<span style="color: #c0392b;">❌ Permiso denegado o error de GPS. Puedes añadir detalles abajo, y compartirnos tu ubicaion por WhatsApp.</span>`;
        }
    );
});

// ==========================================
// ENVIAR A WHATSAPP
// ==========================================
document.getElementById("confirm-order").addEventListener("click", () => {
    const name = document.getElementById("customer-name").value.trim();

    if (!name) {
        showToast("Por favor ingresa tu nombre.");
        return;
    }

    const address = document.getElementById("delivery-address").value.trim();
    const mapsLink = mapsLinkInput.value;

    if (tipoPedido === "Delivery" && !address && !mapsLink) {
        showToast("Por favor comparte tu ubicación o escribe tu dirección para el delivery.");
        return;
    }

    let message = `Hola, soy *${name}*.\n\nQuiero hacer el siguiente pedido:\n\n`;

    cart.forEach(item => {
        message += `• ${item.name}\n`;
        message += `  Cantidad: ${item.quantity}\n`;
        message += `  Precio: RD$ ${item.price}\n`;
        message += `  Subtotal: RD$ ${item.price * item.quantity}\n\n`;
    });

    message += `*TOTAL: RD$ ${total}*\n\n`;
    message += `*TIPO DE PEDIDO:* ${tipoPedido}\n`;

    if (tipoPedido === "Delivery") {
        if (address) message += `*Dirección:* ${address}\n`;
        if (mapsLink) message += `*Ubicación GPS:* ${mapsLink}\n`;
    }

    const encodedMessage = encodeURIComponent(message);
    const phone = "18295180484"; // Reemplazar con el número del restaurante

    window.open(`https://wa.me/${phone}?text=${encodedMessage}`, "_blank");

    localStorage.removeItem("cart");
    window.location.href = "index.html";
});
</script>

</body>
</html>
