<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menú | Restaurante</title>
    <link rel="stylesheet" href="styles/base.css">
    <link rel="stylesheet" href="styles/layout.css">
    <link rel="stylesheet" href="styles/components.css">
    <script src="scripts/navigation.js" defer></script>
    <script src="scripts/menu.js" defer></script>
    <script src="scripts/scroll.js" defer></script>
    <script src="scripts/cart.js" defer></script>
</head>

<body>

    <nav class="top-nav">
        <a href="#entradas">Entradas</a>
        <a href="#platos-fuertes">Platos</a>
        <a href="#postres">Postres</a>
        <a href="#bebidas">Bebidas</a>
        <a href="index.html" id="back-home"> ← Inicio</a>
    </nav>

<header class="hero">
    <div class="hero-logo">
        <img src="images/logo.jpeg" alt="Logo del restaurante">
    </div>
</header>


<main>
    <div class="search-container">
        <input type="text" id="searchInput" class="search-input" placeholder="Buscar platos, ingredientes...">
    </div>
    <section id="entradas" class="menu-category">
        <div class="section-header">
            <h2>Entradas</h2>
            <button class="toggle-btn">↑</button>
        </div>
        <div class="section-content" id="contenedor-entradas"></div>
    </section>

    <section id="platos-fuertes" class="menu-category">
        <div class="section-header">
            <h2>Platos Fuertes</h2>
            <button class="toggle-btn">↑</button>
        </div>
        <div class="section-content" id="contenedor-platos-fuertes"></div>
    </section>

    <section id="postres" class="menu-category">
        <div class="section-header">
            <h2>Postres</h2>
            <button class="toggle-btn">↑</button>
        </div>
        <div class="section-content" id="contenedor-postres"></div>
    </section>

    <section id="bebidas" class="menu-category">
        <div class="section-header">
            <h2>Bebidas</h2>
            <button class="toggle-btn">↑</button>
        </div>
        <div class="section-content" id="contenedor-bebidas"></div>
    </section>
</main>

<button id="backToTop" aria-label="Volver arriba">
    ↑
</button>

<a href="checkout.html" class="floating-cart">
    🛒 <span id="cart-count">0</span>
</a>
</body>
</html>
